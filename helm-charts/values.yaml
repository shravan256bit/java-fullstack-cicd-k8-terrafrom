backend:
  replicaCount: 2
  image:
    repository: shravan256bit/auth-backend
    tag: "23"
    pullPolicy: IfNotPresent
  containerPort: 8080
frontend:
  replicaCount: 2
  image:
    repository: shravan256bit/auth-frontend
    tag: v5
    pullPolicy: IfNotPresent
  containerPort: 80
service:
  backend:
    type: ClusterIP
    port: 8081
    targetPort: 8080
  frontend:
    type: ClusterIP
    port: 80
    targetPort: 80
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
  paths:
    - path: /
      serviceName: frontend-service
      servicePort: 80
    - path: /api
      serviceName: backend-service
      servicePort: 8081
